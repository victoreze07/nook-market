name: nook-market

services:
  storefront:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build: ./services/gateway
    environment:
      PORT: 8080
      CATALOG_URL: http://catalog:4001
      CART_URL: http://cart:4002
      ORDERS_URL: http://orders:4003
      AUTH_URL: http://auth:4004
      ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      catalog:
        condition: service_healthy
      cart:
        condition: service_healthy
      orders:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth:
    build: ./services/auth
    environment:
      PORT: 4004
      DATABASE_URL: postgresql://${POSTGRES_USER:-nook}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-nook}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4004/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  catalog:
    build: ./services/catalog
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-nook}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-nook}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  cart:
    build: ./services/cart
    environment:
      PORT: 4002
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  orders:
    build: ./services/orders
    environment:
      PORT: 4003
      DATABASE_URL: postgresql://${POSTGRES_USER:-nook}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-nook}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nook}
      POSTGRES_USER: ${POSTGRES_USER:-nook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nook} -d ${POSTGRES_DB:-nook}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
